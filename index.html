<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Under Development</title>
<style>
  :root {
    --bg-1: #05060f;
    --bg-2: #0b1026;
    --accent: #6c5ce7;
    --accent-2: #00d4ff;
    --accent-3: #ff2e88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 40%, var(--bg-2) 0%, var(--bg-1) 70%);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #fff;
  }

  /* ---------- starfield ---------- */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    opacity: 0.7;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50%      { opacity: 0.9; }
  }

  /* ---------- 3D scene ---------- */
  .scene {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    z-index: 2;
  }

  .world {
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  /* ---------- layered 3D headline ---------- */
  .headline {
    transform-style: preserve-3d;
    text-align: center;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-18px); }
  }

  .headline h1 {
    font-size: clamp(2.4rem, 7vw, 6rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.05;
    background: linear-gradient(115deg, #fff 20%, var(--accent-2) 50%, var(--accent) 80%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(108, 92, 231, 0.55))
            drop-shadow(0 18px 30px rgba(0, 0, 0, 0.9));
    transform: translateZ(80px);
  }

  .headline .sub {
    margin-top: 1.2rem;
    font-size: clamp(0.85rem, 2vw, 1.15rem);
    font-weight: 300;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.65);
    transform: translateZ(40px);
  }

  /* ---------- spinning wireframe cube ---------- */
  .cube-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 340px;
    height: 340px;
    transform: translate(-50%, -50%) translateZ(-150px);
    transform-style: preserve-3d;
    opacity: 0.9;
    pointer-events: none;
  }
  .cube {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    animation: spin 24s linear infinite;
  }
  @keyframes spin {
    from { transform: rotateX(-20deg) rotateY(0deg); }
    to   { transform: rotateX(-20deg) rotateY(360deg); }
  }
  .cube .face {
    position: absolute;
    inset: 0;
    border: 1.5px solid rgba(0, 212, 255, 0.35);
    background: linear-gradient(135deg, rgba(108, 92, 231, 0.06), rgba(0, 212, 255, 0.05));
    box-shadow: inset 0 0 60px rgba(0, 212, 255, 0.07);
  }
  .cube .face:nth-child(1) { transform: translateZ(170px); }
  .cube .face:nth-child(2) { transform: rotateY(180deg) translateZ(170px); }
  .cube .face:nth-child(3) { transform: rotateY(90deg)  translateZ(170px); }
  .cube .face:nth-child(4) { transform: rotateY(-90deg) translateZ(170px); }
  .cube .face:nth-child(5) { transform: rotateX(90deg)  translateZ(170px); }
  .cube .face:nth-child(6) { transform: rotateX(-90deg) translateZ(170px); }

  /* ---------- orbiting rings ---------- */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    border: 1px solid transparent;
    pointer-events: none;
    transform-style: preserve-3d;
  }
  .ring-1 {
    width: 560px; height: 560px;
    margin: -280px 0 0 -280px;
    border-top-color: rgba(255, 46, 136, 0.55);
    border-bottom-color: rgba(255, 46, 136, 0.15);
    animation: orbit1 14s linear infinite;
  }
  .ring-2 {
    width: 700px; height: 700px;
    margin: -350px 0 0 -350px;
    border-left-color: rgba(0, 212, 255, 0.45);
    border-right-color: rgba(0, 212, 255, 0.12);
    animation: orbit2 20s linear infinite reverse;
  }
  @keyframes orbit1 {
    from { transform: rotateX(72deg) rotateZ(0deg); }
    to   { transform: rotateX(72deg) rotateZ(360deg); }
  }
  @keyframes orbit2 {
    from { transform: rotateX(80deg) rotateY(10deg) rotateZ(0deg); }
    to   { transform: rotateX(80deg) rotateY(10deg) rotateZ(360deg); }
  }

  /* ---------- progress bar ---------- */
  .progress {
    width: min(420px, 70vw);
    transform: translateZ(60px);
    text-align: center;
  }
  .progress .track {
    height: 6px;
    border-radius: 99px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
    box-shadow: 0 0 20px rgba(108, 92, 231, 0.25);
  }
  .progress .fill {
    height: 100%;
    width: 40%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    animation: load 3.2s ease-in-out infinite alternate;
  }
  @keyframes load {
    from { width: 22%; }
    to   { width: 78%; }
  }
  .progress .label {
    margin-top: 0.9rem;
    font-size: 0.78rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.45);
  }
  .progress .label .dots::after {
    content: "";
    animation: dots 1.6s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
  }

  /* ---------- glow floor ---------- */
  .floor {
    position: fixed;
    left: 50%;
    bottom: -14vh;
    width: 140vw;
    height: 40vh;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center,
                rgba(108, 92, 231, 0.28) 0%,
                rgba(0, 212, 255, 0.10) 40%,
                transparent 70%);
    filter: blur(10px);
    pointer-events: none;
    z-index: 1;
  }

  @media (max-width: 640px) {
    .cube-wrap { width: 230px; height: 230px; }
    .cube .face:nth-child(1) { transform: translateZ(115px); }
    .cube .face:nth-child(2) { transform: rotateY(180deg) translateZ(115px); }
    .cube .face:nth-child(3) { transform: rotateY(90deg)  translateZ(115px); }
    .cube .face:nth-child(4) { transform: rotateY(-90deg) translateZ(115px); }
    .cube .face:nth-child(5) { transform: rotateX(90deg)  translateZ(115px); }
    .cube .face:nth-child(6) { transform: rotateX(-90deg) translateZ(115px); }
    .ring-1 { width: 360px; height: 360px; margin: -180px 0 0 -180px; }
    .ring-2 { width: 460px; height: 460px; margin: -230px 0 0 -230px; }
  }
</style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="floor"></div>

  <div class="scene">
    <div class="world" id="world">
      <div class="cube-wrap">
        <div class="cube">
          <div class="face"></div><div class="face"></div><div class="face"></div>
          <div class="face"></div><div class="face"></div><div class="face"></div>
        </div>
      </div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>

      <div class="headline">
        <h1>Website<br />Under<br />Development</h1>
        <div class="sub">Something amazing is coming</div>
      </div>

      <div class="progress">
        <div class="track"><div class="fill"></div></div>
        <div class="label">Building<span class="dots"></span></div>
      </div>
    </div>
  </div>

<script>
  // Generate a randomized starfield
  const stars = document.getElementById("stars");
  for (let i = 0; i < 140; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2.2 + 0.6;
    s.style.width = s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    s.style.animationDelay = Math.random() * 4 + "s";
    s.style.animationDuration = 2.5 + Math.random() * 4 + "s";
    stars.appendChild(s);
  }

  // Mouse-driven 3D parallax tilt
  const world = document.getElementById("world");
  const maxTilt = 10;
  document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 2;
    const y = (e.clientY / window.innerHeight - 0.5) * 2;
    world.style.transform =
      "rotateY(" + (x * maxTilt) + "deg) rotateX(" + (-y * maxTilt) + "deg)";
  });
  document.addEventListener("mouseleave", () => {
    world.style.transform = "rotateY(0deg) rotateX(0deg)";
  });

  // Device tilt on mobile
  window.addEventListener("deviceorientation", (e) => {
    if (e.gamma === null) return;
    const x = Math.max(-1, Math.min(1, e.gamma / 45));
    const y = Math.max(-1, Math.min(1, (e.beta - 45) / 45));
    world.style.transform =
      "rotateY(" + (x * maxTilt) + "deg) rotateX(" + (-y * maxTilt) + "deg)";
  });
</script>
</body>
</html>
